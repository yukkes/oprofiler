syntax = "proto3";

package com.openprofiler.protocol;

option java_package = "com.openprofiler.protocol";
option java_outer_classname = "OProfilerProtocol";

// ============================================================================
// Command Messages (GUI → Agent)
// ============================================================================

message Command {
  enum CommandType {
    UNKNOWN_COMMAND = 0;
    START_CPU_RECORDING = 1;
    STOP_CPU_RECORDING = 2;
    START_ALLOC_RECORDING = 3;
    STOP_ALLOC_RECORDING = 4;
    SAVE_SNAPSHOT = 5;
    GET_CPU_DATA = 6;
    GET_MEMORY_DATA = 7;
    GET_THREAD_DATA = 8;
    SET_SAMPLING_INTERVAL = 9;
    SET_THREAD_FILTER = 10;
  }
  CommandType type = 1;
  string session_id = 2;
  oneof payload {
    StartCpuRecordingCommand start_cpu_recording = 3;
    SaveSnapshotCommand save_snapshot = 4;
    GetCpuDataCommand get_cpu_data = 5;
    SetSamplingIntervalCommand set_sampling_interval = 6;
    SetThreadFilterCommand set_thread_filter = 7;
  }
}

message StartCpuRecordingCommand {
  enum CpuMode {
    SAMPLING = 0;
    INSTRUMENTATION = 1;
    ASYNC_SAMPLING = 2;
  }
  CpuMode mode = 1;
  uint32 sampling_interval_ms = 2;
}

message SaveSnapshotCommand {
  string file_path = 1;
}

message GetCpuDataCommand {
  string thread_filter = 1;
}

message SetSamplingIntervalCommand {
  uint32 interval_ms = 1;
}

message SetThreadFilterCommand {
  string thread_pattern = 1;
  string thread_status = 2;
}

// ============================================================================
// Data Messages (Agent → GUI)
// ============================================================================

message ProfilingData {
  enum DataType {
    UNKNOWN_DATA = 0;
    CPU_DATA = 1;
    MEMORY_DATA = 2;
    THREAD_DATA = 3;
    HEARTBEAT = 4;
  }
  DataType type = 1;
  uint64 timestamp_nano = 2;
  oneof payload {
    CpuData cpu_data = 3;
    MemoryData memory_data = 4;
    ThreadData thread_data = 5;
    HeartbeatData heartbeat = 6;
  }
}

// ============================================================================
// CPU Data
// ============================================================================

message CpuData {
  uint64 total_sample_count = 1;
  uint32 sampling_interval_ms = 2;
  MethodGraph method_graph = 3;
  CallTree call_tree = 4;
  repeated HotSpot hot_spots = 5;
}

message HotSpot {
  string class_name = 1;
  string method_name = 2;
  string method_descriptor = 3;
  uint64 self_samples = 4;
  uint64 total_samples = 5;
  uint64 self_duration_nano = 6;
  uint64 total_duration_nano = 7;
  double percent = 8;
  uint64 invocations = 9;
}

// ============================================================================
// Method Graph
// ============================================================================

message MethodGraph {
  repeated MethodNode nodes = 1;
  repeated MethodEdge edges = 2;
}

message MethodNode {
  int32 id = 1;
  string class_name = 2;
  string method_name = 3;
  string method_descriptor = 4;
  uint64 execution_count = 5;
  uint64 total_duration_nano = 6;
  uint64 self_duration_nano = 7;
}

message MethodEdge {
  int32 from_node_id = 1;
  int32 to_node_id = 2;
  uint64 call_count = 3;
  uint64 total_duration_nano = 4;
}

// ============================================================================
// Call Tree
// ============================================================================

message CallTree {
  repeated CallTreeNode nodes = 1;
}

message CallTreeNode {
  int32 id = 1;
  int32 parent_id = 2;
  string class_name = 3;
  string method_name = 4;
  string method_descriptor = 5;
  string file_name = 6;
  int32 line_number = 7;
  uint64 self_duration_nano = 8;
  uint64 total_duration_nano = 9;
  uint64 call_count = 10;
  repeated int32 children = 11;
}

// ============================================================================
// Memory Data
// ============================================================================

message MemoryData {
  AllocationTree allocation_tree = 1;
  repeated HeapObjectInfo heap_object_infos = 2;
  uint64 heap_used_bytes = 3;
  uint64 heap_committed_bytes = 4;
}

message AllocationTree {
  repeated AllocationTreeNode nodes = 1;
}

message AllocationTreeNode {
  int32 id = 1;
  int32 parent_id = 2;
  string class_name = 3;
  string method_name = 4;
  string method_descriptor = 5;
  string file_name = 6;
  int32 line_number = 7;
  string allocated_type = 8;
  uint64 allocated_size = 9;
  uint64 instance_count = 10;
}

message HeapObjectInfo {
  uint64 object_id = 1;
  string class_name = 2;
  uint64 size = 3;
  repeated uint64 references_to = 4;
  repeated uint64 references_from = 5;
}

// ============================================================================
// Thread Data
// ============================================================================

message ThreadData {
  repeated ThreadInfo thread_infos = 1;
  uint64 total_thread_count = 2;
  uint64 runnable_count = 3;
  uint64 waiting_count = 4;
  uint64 blocked_count = 5;
}

message ThreadInfo {
  int64 thread_id = 1;
  string thread_name = 2;
  string thread_state = 3;
  repeated StackTraceElement stack_trace = 4;
  string lock_info = 5;
}

message StackTraceElement {
  string class_name = 1;
  string method_name = 2;
  string file_name = 3;
  int32 line_number = 4;
  bool native_method = 5;
}

// ============================================================================
// Heartbeat
// ============================================================================

message HeartbeatData {
  uint64 uptime_nano = 1;
  uint32 active_recordings = 2;
}
